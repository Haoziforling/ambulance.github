        }

            max-width: 1400px;
            margin: 0 auto;

            padding: 20px 24px 32px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3c72, #2a5298);

            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .sub {
            color: #475569;
            margin-bottom: 24px;
            border-left: 4px solid #3b82f6;
            padding-left: 16px;
            font-size: 0.95rem;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 24px;
            flex: 1 1 150px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #475569;
            letter-spacing: 0.5px;
        }
        .stat-card.warning .stat-number { color: #e67e22; }
        .stat-card.danger .stat-number { color: #e53e3e; }
        .stat-card.high-risk .stat-number { color: #c0392b; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            align-items: flex-end;
            background: #f9f9ff;
            padding: 16px;
            border-radius: 28px;
        }
        .search-box {
            flex: 2;
            min-width: 200px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 130px;
        }
        .filter-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #334155;
            text-transform: uppercase;
        }
        select, .reset-btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .reset-btn {
            background: #3b82f6;
            color: white;
            border: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .reset-btn:hover {
            background: #2563eb;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }
        th {
            background: #f1f5f9;
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th:hover {
            background: #e6edf5;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ecf3fa;
            vertical-align: middle;
        }
        tr:hover td {
            background-color: #fefce8;
        }
        .high-risk-badge {
            background: #fee2e2;
            color: #b91c1c;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-block;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .status-valid { background: #d1fae5; color: #065f46; }
        .status-near { background: #fed7aa; color: #9b2c1d; }
        .status-expired { background: #fecaca; color: #991b1b; font-weight: bold; }
        .status-perpetual { background: #e2e3e8; color: #2c3e50; }
        .shortage {
            background-color: #fff0db;
            font-weight: bold;
            color: #c2410c;
        }
        .shortage-badge {
            background: #ffedd5;
            color: #9a3412;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

            text-align: center;

            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

            font-size: 0.7rem;
            margin-left: 5px;
        }
        @media (max-width: 640px) {
            body { padding: 10px; }
            .container { padding: 16px; }
            .stat-card { padding: 8px 12px; }
            .stat-number { font-size: 1.5rem; }
            .controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>

    // 列定义
    const columns = [
        { key: "id", label: "编号", sortable: true },
        { key: "name", label: "药品/物品名称", sortable: true },
        { key: "base", label: "基数", sortable: true },
        { key: "high_risk", label: "高危物品", sortable: false, render: (v) => {
            if(v && v !== "" && v !== "否") return `<span class="high-risk-badge">⚠️ ${v}</span>`;
            return "—";
        } },
        { key: "spec", label: "规格", sortable: false },
        { key: "expiry_display", label: "有效期", sortable: true },
        { key: "quantity", label: "数量", sortable: true, render: (v, item) => {
            let shortageHtml = item.shortage ? `<span class="shortage-badge">短缺</span>` : "";
            return `<span>${v}</span> ${shortageHtml}`;
        } },
        { key: "remark", label: "备注", sortable: false },
        { key: "status", label: "效期状态", sortable: true, render: (v) => {
            const map = {
                "valid": "✅ 正常有效",
                "near": "⚠️ 近效期",
                "expired": "❌ 已过期",
                "perpetual": "♾️ 长期有效"
            };
            let cls = "";
            if(v==="valid") cls="status-valid";
            else if(v==="near") cls="status-near";
            else if(v==="expired") cls="status-expired";
            else cls="status-perpetual";
            return `<span class="status-badge ${cls}">${map[v] || v}</span>`;
        } }
    ];

    let currentData = [...medicines];
    let sortColumn = "id";
    let sortAsc = true;

    function renderTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        if(currentData.length === 0) {
            tbody.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:40px;'>📭 没有找到匹配的药品</td></tr>";
            return;
        }
        currentData.forEach(item => {
            const row = document.createElement("tr");
            if(item.shortage) row.classList.add("shortage");
            columns.forEach(col => {
                const td = document.createElement("td");
                let value = item[col.key];
                if(col.render) {
                    td.innerHTML = col.render(value, item);
                } else {
                    td.textContent = value ?? "—";
                }
                // 特殊高亮：有效期过期样式
                if(col.key === "expiry_display" && item.status === "expired") {
                    td.style.fontWeight = "bold";
                    td.style.color = "#dc2626";
                }
                row.appendChild(td);
            });
            tbody.appendChild(row);
        });
    }

    function sortData() {
        currentData.sort((a,b) => {
            let aVal = a[sortColumn];
            let bVal = b[sortColumn];
            if(sortColumn === "base" || sortColumn === "quantity") {
                aVal = Number(aVal) || 0;
                bVal = Number(bVal) || 0;
            } else if(sortColumn === "expiry_display") {
                // 按原始日期排序（若有expiry_date则优先）
                const aDate = a.expiry_date ? new Date(a.expiry_date) : null;
                const bDate = b.expiry_date ? new Date(b.expiry_date) : null;
                if(aDate && bDate) return sortAsc ? aDate - bDate : bDate - aDate;
                if(aDate && !bDate) return sortAsc ? -1 : 1;
                if(!aDate && bDate) return sortAsc ? 1 : -1;
                return sortAsc ? String(a.expiry_display).localeCompare(b.expiry_display) : String(b.expiry_display).localeCompare(a.expiry_display);
            } else if(sortColumn === "status") {
                const order = {"expired":1, "near":2, "valid":3, "perpetual":4};
                aVal = order[a.status] || 99;
                bVal = order[b.status] || 99;
            }
            if(aVal < bVal) return sortAsc ? -1 : 1;
            if(aVal > bVal) return sortAsc ? 1 : -1;
            return 0;
        });
    }

    function applyFilters() {
        const searchTerm = document.getElementById("searchInput").value.trim().toLowerCase();
        const highRiskVal = document.getElementById("highRiskFilter").value;
        const statusVal = document.getElementById("statusFilter").value;
        const shortageVal = document.getElementById("shortageFilter").value;

        currentData = medicines.filter(item => {
            // 搜索匹配：名称/规格/备注
            let matchSearch = true;
            if(searchTerm) {
                matchSearch = item.name.toLowerCase().includes(searchTerm) ||
                              (item.spec && item.spec.toLowerCase().includes(searchTerm)) ||
                              (item.remark && item.remark.toLowerCase().includes(searchTerm));
            }
            // 高危筛选
            let matchHigh = true;
            if(highRiskVal === "high") matchHigh = item.high_risk && item.high_risk !== "" && item.high_risk !== "否";
            if(highRiskVal === "normal") matchHigh = !item.high_risk || item.high_risk === "" || item.high_risk === "否";
            // 效期筛选
            let matchStatus = true;
            if(statusVal) matchStatus = item.status === statusVal;
            // 短缺筛选
            let matchShortage = true;
            if(shortageVal === "shortage") matchShortage = item.shortage === true;
            if(shortageVal === "sufficient") matchShortage = item.shortage === false;

            return matchSearch && matchHigh && matchStatus && matchShortage;
        });
        sortData();
        renderTable();
        updateStats();
    }

    function updateStats() {
        // 更新统计数字（动态显示当前筛选后的数量）
        const totalSpan = document.querySelector(".stats .stat-card:first-child .stat-number");
        if(totalSpan) totalSpan.innerText = currentData.length;
        const nearCount = currentData.filter(i => i.status === "near").length;
        const expiredCount = currentData.filter(i => i.status === "expired").length;
        const shortageCount = currentData.filter(i => i.shortage).length;
        const highCount = currentData.filter(i => i.high_risk && i.high_risk !== "" && i.high_risk !== "否").length;
        const statCards = document.querySelectorAll(".stats .stat-card");
        if(statCards[1]) statCards[1].querySelector(".stat-number").innerText = highCount;
        if(statCards[2]) statCards[2].querySelector(".stat-number").innerText = nearCount;
        if(statCards[3]) statCards[3].querySelector(".stat-number").innerText = expiredCount;
        if(statCards[4]) statCards[4].querySelector(".stat-number").innerText = shortageCount;
    }

    function buildHeader() {
        const thead = document.getElementById("tableHeader");
        const tr = document.createElement("tr");
        columns.forEach(col => {
            const th = document.createElement("th");
            th.textContent = col.label;
            if(col.sortable) {
                th.style.cursor = "pointer";
                th.addEventListener("click", () => {
                    if(sortColumn === col.key) {
                        sortAsc = !sortAsc;
                    } else {
                        sortColumn = col.key;
                        sortAsc = true;
                    }
                    sortData();
                    renderTable();
                    updateSortIcons();
                });
                // 存储排序标记
                th.setAttribute("data-col", col.key);
            }
            tr.appendChild(th);
        });
        thead.innerHTML = "";
        thead.appendChild(tr);
        updateSortIcons();
    }

    function updateSortIcons() {
        const ths = document.querySelectorAll("#tableHeader th");
        ths.forEach(th => {
            const colKey = th.getAttribute("data-col");
            if(colKey === sortColumn) {
                let existing = th.querySelector(".sort-icon");
                if(!existing) {
                    existing = document.createElement("span");
                    existing.className = "sort-icon";
                    th.appendChild(existing);
                }
                existing.textContent = sortAsc ? " ▲" : " ▼";
            } else {
                const icon = th.querySelector(".sort-icon");
                if(icon) icon.remove();
            }
        });
    }

    function resetFilters() {
        document.getElementById("searchInput").value = "";
        document.getElementById("highRiskFilter").value = "";
        document.getElementById("statusFilter").value = "";
        document.getElementById("shortageFilter").value = "";
        applyFilters();
    }

    document.addEventListener("DOMContentLoaded", () => {
        buildHeader();
        applyFilters();
        document.getElementById("searchInput").addEventListener("input", applyFilters);
        document.getElementById("highRiskFilter").addEventListener("change", applyFilters);
        document.getElementById("statusFilter").addEventListener("change", applyFilters);
        document.getElementById("shortageFilter").addEventListener("change", applyFilters);
        document.getElementById("resetBtn").addEventListener("click", resetFilters);
    });
</script>
